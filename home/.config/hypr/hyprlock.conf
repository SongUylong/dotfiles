# hyprlock — see https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/
$font = Maple Mono

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = $HOME/dotfiles/wallpapers/clouds-5.jpg
    color = rgba(29, 32, 33, 255)
    blur_passes = 2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_spacing = 0.4
    inner_color = rgba(102, 92, 84, 0.33)
    outer_color = rgba(168, 153, 132, 0.95)
    check_color = rgba(152, 151, 26, 0.95)
    fail_color = rgba(204, 36, 29, 0.95)
    font_color = rgba(235, 219, 178, 0.9)
    fade_on_empty = false
    font_family = $font
    placeholder_text = Enter password...
    position = 0, 200
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%k:%M')"
    font_size = 115
    font_family = Maple Mono Bold
    color = rgba(235, 219, 178, 0.9)
    position = 0, -150
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +' - %A, %B %d - '
    font_size = 18
    font_family = $font
    color = rgba(235, 219, 178, 0.9)
    position = 0, -350
    halign = center
    valign = top
}

label {
    monitor =
    text =   $USER
    font_size = 15
    font_family = Maple Mono Bold
    color = rgba(235, 219, 178, 1.0)
    position = 0, 284
    halign = center
    valign = bottom
}

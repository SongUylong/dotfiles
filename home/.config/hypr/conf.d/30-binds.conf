# Classic stack: Rofi, Waybar, SwayNC, hypridle (not Caelestia)

# show keybinds list
bind = $mainMod, F1, exec, show-keybinds

# OCR
bind = Super SHIFT, T, exec, bash -c 'grim -g "$(slurp $SLURP_ARGS)" /tmp/ocr.png && tesseract -l eng /tmp/ocr.png - | wl-copy && rm /tmp/ocr.png'
bind = Ctrl Super SHIFT, S, exec, bash -c 'grim -g "$(slurp $SLURP_ARGS)" /tmp/ocr.png && tesseract /tmp/ocr.png - | wl-copy && rm /tmp/ocr.png'

bind = $mainMod, Return, exec, wezterm
bind = ALT, Return, exec, [float; size 1111 700] wezterm
bind = $mainMod, B, exec, [workspace 1 silent] firefox
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod ALT, F, fullscreen, 0
bind = $mainMod SHIFT, F, exec, nemo
bind = $mainMod SHIFT, Space, exec, browser-search
bind = $mainMod SHIFT, D, exec, webcord --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mainMod SHIFT, Escape, exec, swaylock
bind = ALT, Escape, exec, hyprlock
bind = $mainMod, P, pseudo,
bind = $mainMod, X, togglesplit,
bind = $mainMod, T, exec, wezterm
bind = $mainMod ALT, T, exec, toggle-oppacity
bind = $mainMod, E, exec, toggle-float
bind = ALT, E, exec, hyprctl dispatch exec '[float; size 1111 700] nemo'
bind = $mainMod SHIFT, C ,exec, hyprpicker -a
bind = $mainMod, S, exec, spotify
bind = $mainMod SHIFT, W,exec, hyprctl dispatch exec '[float; size 925 615] waypaper'
bind = $mainMod, N, exec, firefox https://www.notion.so
bind = CTRL SHIFT, Escape, exec, hyprctl dispatch exec '[workspace 9] missioncenter'
bind = $mainMod, equal, exec, woomer

bind = $mainMod SHIFT ALT, S, exec, screenshot --swappy
bind = ,Print, exec, screenshot --copy-save
bind = SHIFT, Print, exec, screenshot --swappy

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod, left, alterzorder, top
bind = $mainMod, right, alterzorder, top
bind = $mainMod, up, alterzorder, top
bind = $mainMod, down, alterzorder, top
bind = $mainMod, h, alterzorder, top
bind = $mainMod, j, alterzorder, top
bind = $mainMod, k, alterzorder, top
bind = $mainMod, l, alterzorder, top

bind = CTRL ALT, up, exec, hyprctl dispatch focuswindow floating
bind = CTRL ALT, down, exec, hyprctl dispatch focuswindow tiled

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod CTRL, c, movetoworkspace, empty

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

bind = $mainMod CTRL, left, resizeactive, -80 0
bind = $mainMod CTRL, right, resizeactive, 80 0
bind = $mainMod CTRL, up, resizeactive, 0 -80
bind = $mainMod CTRL, down, resizeactive, 0 80
bind = $mainMod CTRL, h, resizeactive, -80 0
bind = $mainMod CTRL, j, resizeactive, 0 80
bind = $mainMod CTRL, k, resizeactive, 0 -80
bind = $mainMod CTRL, l, resizeactive, 80 0

bind = $mainMod ALT, left, moveactive, -80 0
bind = $mainMod ALT, right, moveactive, 80 0
bind = $mainMod ALT, up, moveactive, 0 -80
bind = $mainMod ALT, down, moveactive, 0 80
bind = $mainMod ALT, h, moveactive, -80 0
bind = $mainMod ALT, j, moveactive, 0 80
bind = $mainMod ALT, k, moveactive, 0 -80
bind = $mainMod ALT, l, moveactive, 80 0

# Optional ASUS: install asusctl and uncomment
# bind = ,F2, exec, asusctl leds prev
# bind = ,F3, exec, asusctl leds next
bind = ,F4, exec, aura-random

bind = ,XF86AudioPlay,exec, playerctl play-pause
bind = ,XF86AudioNext,exec, playerctl next
bind = ,XF86AudioPrev,exec, playerctl previous
bind = ,XF86AudioStop,exec, playerctl stop

bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

bind = $mainMod, V, exec, toggle-rofi "cliphist list | rofi -dmenu -theme-str 'window {width: 50%;} listview {columns: 1;}' | cliphist decode | wl-copy"

# Classic launcher / bar / notifications
bind = $mainMod, Space, exec, toggle-rofi rofi -show drun
bind = $mainMod, Escape, exec, power-menu
bind = $mainMod SHIFT, S, exec, screenshot --copy-save
bind = $mainMod SHIFT, R, exec, screen-record
bind = $mainMod SHIFT, B, exec, toggle-waybar
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

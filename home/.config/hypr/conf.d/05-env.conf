# Session / toolkit (Wayland)
# Hyprland exec uses a minimal PATH; dotfiles install scripts to ~/.local/bin (toggle-rofi, etc.)
env = PATH,$HOME/.local/bin:$PATH
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = DISABLE_QT5_COMPAT,0
env = GDK_BACKEND,wayland
env = ANKI_WAYLAND,1
env = DIRENV_LOG_FORMAT,
env = WLR_DRM_NO_ATOMIC,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = MOZ_ENABLE_WAYLAND,1
env = WLR_BACKEND,vulkan
env = WLR_RENDERER,vulkan
env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GTK_THEME,Catppuccin-Mocha-Standard-Lavender-Dark
env = GRIMBLAST_HIDE_CURSOR,0

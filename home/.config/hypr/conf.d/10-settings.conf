$mainMod = SUPER

input {
    kb_layout = us,kh
    kb_options = caps:escape,grp:alt_shift_toggle
    numlock_by_default = true
    repeat_delay = 300
    follow_mouse = 0
    float_switch_override_focus = 0
    mouse_refocus = 0
    sensitivity = -1
}

general {
    layout = dwindle
    gaps_in = 4
    gaps_out = 4 8 8 8
    border_size = 2
    col.active_border = rgb(cba6f7) rgb(89b4fa) 45deg
    col.inactive_border = 0x00000000
}

misc {
    disable_hyprland_logo = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizes = false
    enable_swallow = true
    focus_on_activate = false
    on_focus_under_fullscreen = 2
    middle_click_paste = false
    vrr = 0
    vfr = true
}

dwindle {
    force_split = 2
    special_scale_factor = 1.0
    split_width_multiplier = 1.0
    use_active_for_splits = true
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
    special_scale_factor = 1
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 2
        brightness = 1
        contrast = 1.4
        ignore_opacity = true
        noise = 0
        new_optimizations = true
        xray = true
    }
    shadow {
        enabled = true
        ignore_window = true
        offset = 0 2
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = fade_curve, 0, 0.55, 0.45, 1
    animation = windowsIn, 0, 4, easeOutCubic, popin 20%
    animation = windowsOut, 0, 4, fluent_decel, popin 80%
    animation = windowsMove, 1, 2, fluent_decel, slide
    animation = fadeIn, 1, 3, fade_curve
    animation = fadeOut, 1, 3, fade_curve
    animation = fadeSwitch, 0, 1, easeOutCirc
    animation = fadeShadow, 1, 10, easeOutCirc
    animation = fadeDim, 1, 4, fluent_decel
    animation = workspaces, 1, 4, easeOutCubic, fade
}

xwayland {
    force_zero_scaling = true
}

workspace = w[tv1], gapsout:16, gapsin:8

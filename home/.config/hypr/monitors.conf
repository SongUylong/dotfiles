# hyprctl monitors — adjust for your hardware
# monitor = NAME, resolution@hz, position, scale [, transform]
# Lower scale = smaller UI (less “zoomed”). 1440p → 1.33; HDMI 1080p → 1.25.

monitor=,preferred,auto,1.33
monitor=HDMI-A-1,1920x1080@60,auto-left,1.25
# monitor=HDMI-A-1,1920x1080@60,auto,1.25,transform,3
# monitor=HDMI-A-1,disable
monitor=DP-2,2560x1440@143.97Hz,auto,1.33
monitor=DP-3,2560x1440@143.97Hz,auto,1.33

workspace = 1, monitor:HDMI-A-1, default:true

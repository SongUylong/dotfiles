# Hyprland — Fedora dotfiles
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Machine-specific monitors & workspace assignment (edit freely)
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/workspaces.conf

source = $HOME/.config/hypr/conf.d/05-env.conf
source = $HOME/.config/hypr/conf.d/10-settings.conf
source = $HOME/.config/hypr/conf.d/20-windows.conf
source = $HOME/.config/hypr/conf.d/30-binds.conf
source = $HOME/.config/hypr/conf.d/40-exec.conf
